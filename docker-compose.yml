services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docintel
      POSTGRES_USER: docintel
      POSTGRES_PASSWORD: docintel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docintel -d docintel"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Database__Provider: Postgres
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=docintel;Username=docintel;Password=docintel"
      Ai__Provider: Stub
      Cors__Origins__0: "http://localhost:4200"
    ports:
      - "5080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  pgdata:
